<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Password</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f7f4ef;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      .box {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      h2 {
        margin-bottom: 1rem;
      }

      input {
        width: 100%;
        padding: 0.9rem;
        margin-bottom: 1rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
      }

      button {
        width: 100%;
        padding: 0.9rem;
        border: none;
        background: #1a1814;
        color: white;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
      }

      button:hover {
        background: #c8533a;
      }

      .msg {
        margin-bottom: 1rem;
        padding: 0.8rem;
        border-radius: 8px;
        font-size: 0.95rem;
      }

      .success {
        background: #ecfdf5;
        color: #065f46;
      }

      .error {
        background: #fef2f2;
        color: #b91c1c;
      }

      .info {
        background: #eff6ff;
        color: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>Create New Password</h2>
      <div id="msgArea"></div>

      <form id="updatePasswordForm">
        <input
          type="password"
          id="new-password"
          placeholder="Enter new password"
          required
          minlength="6"
        />

        <input
          type="password"
          id="confirm-password"
          placeholder="Confirm new password"
          required
          minlength="6"
        />

        <button type="submit">Update Password</button>
      </form>
    </div>

    <script>
      const SUPABASE_URL = "https://rdnkijeggxngvrfwuobo.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkbmtpamVnZ3huZ3ZyZnd1b2JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwMjExOTgsImV4cCI6MjA4NTU5NzE5OH0.7mPgjG1T95MH1xaL2HFySm2GGjSt_BDZCJcI5McWth0";

      const client = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      const msgArea = document.getElementById("msgArea");

      function showMsg(text, type) {
        msgArea.innerHTML = `<div class="msg ${type}">${text}</div>`;
      }

      document
        .getElementById("updatePasswordForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const password = document.getElementById("new-password").value;
          const confirm = document.getElementById("confirm-password").value;

          if (password !== confirm) {
            showMsg("Passwords do not match", "error");
            return;
          }

          try {
            const { error } = await client.auth.updateUser({
              password: password,
            });

            if (error) throw error;

            showMsg("Password updated successfully! Redirecting...", "success");

            setTimeout(() => {
              window.location.href = "login.html";
            }, 2000);
          } catch (err) {
            showMsg(err.message, "error");
          }
        });

      showMsg("Enter your new password below.", "info");
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechGear — Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f7f4ef;
        --bg2: #eeeae2;
        --white: #ffffff;
        --ink: #1a1814;
        --ink2: #4a4740;
        --ink3: #9a9690;
        --border: #e2ddd6;
        --border2: #d4cfc8;
        --accent: #c8533a;
        --accent-lt: #f5e8e4;
        --green: #2d7a5f;
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      /* LEFT PANEL */
      .left-panel {
        background: var(--ink);
        padding: 3rem;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
        overflow: hidden;
      }

      /* Subtle grid texture on left panel */
      .left-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }

      .left-panel::after {
        content: "";
        position: absolute;
        bottom: -80px;
        right: -80px;
        width: 320px;
        height: 320px;
        background: radial-gradient(
          circle,
          rgba(200, 83, 58, 0.18) 0%,
          transparent 65%
        );
        pointer-events: none;
      }

      .lp-top {
        position: relative;
        z-index: 1;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        margin-bottom: 3rem;
      }
      .brand-mark {
        width: 38px;
        height: 38px;
        background: var(--accent);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }
      .brand-name {
        font-family: "Playfair Display", serif;
        font-size: 1.3rem;
        font-weight: 700;
        color: white;
      }

      .lp-headline {
        font-family: "Playfair Display", serif;
        font-size: 2.6rem;
        font-weight: 700;
        color: white;
        line-height: 1.14;
        letter-spacing: -1px;
        margin-bottom: 1rem;
      }
      .lp-sub {
        font-size: 0.92rem;
        color: rgba(255, 255, 255, 0.5);
        line-height: 1.65;
      }

      .lp-bottom {
        position: relative;
        z-index: 1;
      }
      .feature-list {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
      }
      .feature-row {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        padding: 0.75rem 0.9rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 11px;
        color: rgba(255, 255, 255, 0.75);
        font-size: 0.84rem;
      }
      .feature-row svg {
        color: var(--accent);
        flex-shrink: 0;
      }

      /* RIGHT PANEL */
      .right-panel {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 2rem;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .auth-box {
        width: 100%;
        max-width: 400px;
        animation: fadeUp 0.5s ease;
      }

      .auth-box-header {
        margin-bottom: 2rem;
      }
      .auth-box-header h2 {
        font-family: "Playfair Display", serif;
        font-size: 1.8rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 0.3rem;
      }
      .auth-box-header p {
        font-size: 0.875rem;
        color: var(--ink3);
      }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 0;
        background: var(--bg2);
        border-radius: 11px;
        padding: 0.25rem;
        margin-bottom: 2rem;
      }
      .tab-btn {
        flex: 1;
        background: none;
        border: none;
        padding: 0.6rem;
        border-radius: 8px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--ink3);
        cursor: pointer;
        transition: all 0.2s;
      }
      .tab-btn.active {
        background: var(--white);
        color: var(--ink);
        font-weight: 600;
        box-shadow: 0 1px 4px rgba(26, 24, 20, 0.1);
      }

      /* Messages */
      .msg-area {
        margin-bottom: 1.1rem;
        min-height: 1rem;
      }
      .msg {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        border-radius: 10px;
        font-size: 0.83rem;
        font-weight: 500;
      }
      .msg.success {
        background: #ecfdf5;
        border: 1px solid #a7f3d0;
        color: var(--green);
      }
      .msg.error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #dc2626;
      }
      .msg.info {
        background: var(--accent-lt);
        border: 1px solid #f4a99a;
        color: var(--accent);
      }

      /* Forms */
      .auth-form {
        display: none;
      }
      .auth-form.active {
        display: block;
      }

      .field {
        margin-bottom: 1.1rem;
      }
      .field label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--ink3);
        margin-bottom: 0.45rem;
      }
      .field-wrap {
        position: relative;
      }
      .field-icon {
        position: absolute;
        left: 0.85rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--ink3);
        pointer-events: none;
      }
      .field input {
        width: 100%;
        background: var(--white);
        border: 1px solid var(--border);
        color: var(--ink);
        padding: 0.8rem 0.9rem 0.8rem 2.6rem;
        border-radius: 10px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.9rem;
        outline: none;
        transition: all 0.18s;
      }
      .field input::placeholder {
        color: var(--ink3);
      }
      .field input:focus {
        border-color: var(--ink2);
        box-shadow: 0 0 0 3px rgba(26, 24, 20, 0.07);
      }

      .pwd-reveal {
        position: absolute;
        right: 0.85rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: var(--ink3);
        display: flex;
        align-items: center;
        transition: color 0.15s;
      }
      .pwd-reveal:hover {
        color: var(--ink2);
      }

      .field-row-meta {
        display: flex;
        justify-content: flex-end;
        margin-top: 0.35rem;
      }
      .field-row-meta a {
        font-size: 0.76rem;
        color: var(--accent);
        text-decoration: none;
      }
      .field-row-meta a:hover {
        text-decoration: underline;
      }

      .submit-btn {
        width: 100%;
        background: var(--ink);
        color: white;
        border: none;
        padding: 0.9rem;
        border-radius: 11px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 0.75rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition: all 0.2s;
      }
      .submit-btn:hover {
        background: var(--accent);
        box-shadow: 0 5px 18px rgba(200, 83, 58, 0.28);
        transform: translateY(-1px);
      }
      .submit-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .spinner {
        width: 17px;
        height: 17px;
        border: 2.5px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .auth-footer {
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .trust-item {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.76rem;
        color: var(--ink3);
      }
      .trust-item svg {
        color: var(--green);
      }

      @media (max-width: 768px) {
        body {
          grid-template-columns: 1fr;
        }
        .left-panel {
          display: none;
        }
        .right-panel {
          padding: 2rem 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- RIGHT -->
    <div class="right-panel">
      <div class="auth-box">
        <div class="auth-box-header">
          <h2>Welcome back</h2>
          <p>Sign in to your account to continue shopping</p>
        </div>

        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('signin')">
            Sign In
          </button>
          <button class="tab-btn" onclick="switchTab('signup')">
            Create Account
          </button>
        </div>

        <div class="msg-area" id="msgArea"></div>

        <!-- SIGN IN -->
        <form
          class="auth-form active"
          id="signinForm"
          onsubmit="handleSignIn(event)"
        >
          <div class="field">
            <label>Email address</label>
            <div class="field-wrap">
              <span class="field-icon"
                ><i data-lucide="mail" style="width: 15px; height: 15px"></i
              ></span>
              <input
                type="email"
                id="signin-email"
                placeholder="you@example.com"
                required
                autocomplete="email"
              />
            </div>
          </div>
          <div class="field">
            <label>Password</label>
            <div class="field-wrap">
              <span class="field-icon"
                ><i data-lucide="lock" style="width: 15px; height: 15px"></i
              ></span>
              <input
                type="password"
                id="signin-password"
                placeholder="••••••••"
                required
                autocomplete="current-password"
              />
              <button
                type="button"
                class="pwd-reveal"
                onclick="togglePwd('signin-password', this)"
              >
                <i data-lucide="eye" style="width: 15px; height: 15px"></i>
              </button>
            </div>
            <div class="field-row-meta">
              <a
                href="#"
                onclick="
                  forgotPwd();
                  return false;
                "
                >Forgot password?</a
              >
            </div>
          </div>
          <button type="submit" class="submit-btn" id="signin-btn">
            <i data-lucide="arrow-right" style="width: 15px; height: 15px"></i>
            Sign In
          </button>
        </form>

        <!-- SIGN UP -->
        <form class="auth-form" id="signupForm" onsubmit="handleSignUp(event)">
          <div class="field">
            <label>Full name</label>
            <div class="field-wrap">
              <span class="field-icon"
                ><i data-lucide="user" style="width: 15px; height: 15px"></i
              ></span>
              <input
                type="text"
                id="signup-name"
                placeholder="Jane Doe"
                required
                autocomplete="name"
              />
            </div>
          </div>
          <div class="field">
            <label>Email address</label>
            <div class="field-wrap">
              <span class="field-icon"
                ><i data-lucide="mail" style="width: 15px; height: 15px"></i
              ></span>
              <input
                type="email"
                id="signup-email"
                placeholder="you@example.com"
                required
                autocomplete="email"
              />
            </div>
          </div>
          <div class="field">
            <label>Password</label>
            <div class="field-wrap">
              <span class="field-icon"
                ><i data-lucide="lock" style="width: 15px; height: 15px"></i
              ></span>
              <input
                type="password"
                id="signup-password"
                placeholder="Min. 6 characters"
                required
                minlength="6"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="pwd-reveal"
                onclick="togglePwd('signup-password', this)"
              >
                <i data-lucide="eye" style="width: 15px; height: 15px"></i>
              </button>
            </div>
          </div>
          <div class="field">
            <label>Confirm password</label>
            <div class="field-wrap">
              <span class="field-icon"
                ><i data-lucide="lock" style="width: 15px; height: 15px"></i
              ></span>
              <input
                type="password"
                id="signup-confirm"
                placeholder="Re-enter password"
                required
                minlength="6"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="pwd-reveal"
                onclick="togglePwd('signup-confirm', this)"
              >
                <i data-lucide="eye" style="width: 15px; height: 15px"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="submit-btn" id="signup-btn">
            <i data-lucide="user-plus" style="width: 15px; height: 15px"></i>
            Create Account
          </button>
        </form>

        <div class="auth-footer">
          <div class="trust-item">
            <i data-lucide="shield" style="width: 13px; height: 13px"></i> SSL
            encrypted
          </div>
          <div class="trust-item">
            <i data-lucide="eye-off" style="width: 13px; height: 13px"></i>
            Privacy first
          </div>
          <div class="trust-item">
            <i data-lucide="clock" style="width: 13px; height: 13px"></i> 24/7
            support
          </div>
        </div>
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://rdnkijeggxngvrfwuobo.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkbmtpamVnZ3huZ3ZyZnd1b2JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAwMjExOTgsImV4cCI6MjA4NTU5NzE5OH0.7mPgjG1T95MH1xaL2HFySm2GGjSt_BDZCJcI5McWth0";
      const client = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      lucide.createIcons();

      // Redirect if already logged in
      (async () => {
        const {
          data: { user },
        } = await client.auth.getUser();
        if (user) window.location.href = "store.html";
      })();

      function switchTab(tab) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((b, i) =>
            b.classList.toggle(
              "active",
              (tab === "signin" && i === 0) || (tab === "signup" && i === 1),
            ),
          );
        document
          .getElementById("signinForm")
          .classList.toggle("active", tab === "signin");
        document
          .getElementById("signupForm")
          .classList.toggle("active", tab === "signup");
        document.getElementById("msgArea").innerHTML = "";
        const h = document.querySelector(".auth-box-header h2");
        const p = document.querySelector(".auth-box-header p");
        if (tab === "signin") {
          h.textContent = "Welcome back";
          p.textContent = "Sign in to your account to continue shopping";
        } else {
          h.textContent = "Create account";
          p.textContent = "Join TechGear and start shopping today";
        }
      }

      function showMsg(text, type) {
        const icons = {
          success: "check-circle",
          error: "alert-circle",
          info: "info",
        };
        document.getElementById("msgArea").innerHTML =
          `<div class="msg ${type}"><i data-lucide="${icons[type]}" style="width:15px;height:15px;flex-shrink:0"></i>${text}</div>`;
        lucide.createIcons();
      }

      function togglePwd(id, btn) {
        const el = document.getElementById(id);
        const isText = el.type === "text";
        el.type = isText ? "password" : "text";
        btn.innerHTML = `<i data-lucide="${isText ? "eye" : "eye-off"}" style="width:15px;height:15px"></i>`;
        lucide.createIcons();
      }

      async function handleSignIn(e) {
        e.preventDefault();
        const email = document.getElementById("signin-email").value;
        const password = document.getElementById("signin-password").value;
        const btn = document.getElementById("signin-btn");
        btn.disabled = true;
        btn.innerHTML = `<div class="spinner"></div> Signing in…`;
        try {
          const { error } = await client.auth.signInWithPassword({
            email,
            password,
          });
          if (error) throw error;
          showMsg("Signed in successfully! Redirecting…", "success");
          setTimeout(() => (window.location.href = "store.html"), 900);
        } catch (err) {
          showMsg(err.message, "error");
          btn.disabled = false;
          btn.innerHTML = `<i data-lucide="arrow-right" style="width:15px;height:15px"></i> Sign In`;
          lucide.createIcons();
        }
      }

      async function handleSignUp(e) {
        e.preventDefault();
        const name = document.getElementById("signup-name").value;
        const email = document.getElementById("signup-email").value;
        const pw = document.getElementById("signup-password").value;
        const confirm = document.getElementById("signup-confirm").value;
        const btn = document.getElementById("signup-btn");

        if (pw !== confirm) {
          showMsg("Passwords do not match", "error");
          return;
        }

        btn.disabled = true;
        btn.innerHTML = `<div class="spinner"></div> Creating account…`;
        try {
          const { data, error } = await client.auth.signUp({
            email,
            password: pw,
            options: { data: { full_name: name } },
          });
          if (error) throw error;
          if (data.user && !data.session) {
            showMsg("Account created! Check your email to verify.", "info");
            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="user-plus" style="width:15px;height:15px"></i> Create Account`;
            lucide.createIcons();
          } else {
            showMsg("Account created! Redirecting…", "success");
            setTimeout(() => (window.location.href = "store.html"), 900);
          }
        } catch (err) {
          showMsg(err.message, "error");
          btn.disabled = false;
          btn.innerHTML = `<i data-lucide="user-plus" style="width:15px;height:15px"></i> Create Account`;
          lucide.createIcons();
        }
      }

      async function forgotPwd() {
        const email = document.getElementById("signin-email").value.trim();

        if (!email) {
          showMsg(
            "Please enter your email first so we can send the reset link.",
            "error",
          );
          return;
        }

        try {
          const { error } = await client.auth.resetPasswordForEmail(email, {
            redirectTo: "http://127.0.0.1:5500/update-password.html",
          });

          if (error) throw error;

          showMsg(
            "Reset link sent. Check your email inbox (and spam folder).",
            "success",
          );
        } catch (err) {
          showMsg(err.message, "error");
        }
      }
    </script>
  </body>
</html>
